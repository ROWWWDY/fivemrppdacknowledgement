<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xlantis PD — Personnel Roster</title>
<meta name="description" content="Current personnel of the Xlantis Police Department.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0e15;
    --surface:#121a26;
    --surface-2:#17202e;
    --border:#232e3d;
    --border-strong:#33455c;
    --text:#eef1f5;
    --text-dim:#8fa0b5;
    --text-faint:#546177;
    --gold:#c9a227;
    --gold-bright:#e6c250;
    --tier-trainee:#7c8899;
    --tier-officer:#5b9bd9;
    --tier-nco:#57b17e;
    --tier-senior:#e0ab4c;
    --tier-command:#e6c250;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;
    min-height:100vh;position:relative;
  }
  .bg-decor{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
  .bg-decor::before{
    content:"";position:absolute;inset:-2px;
    background-image:
      linear-gradient(rgba(255,255,255,0.028) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.028) 1px, transparent 1px);
    background-size:42px 42px;
    mask-image:radial-gradient(ellipse 90% 70% at 50% 0%, black 40%, transparent 85%);
  }
  .bg-decor::after{
    content:"";position:absolute;inset:0;
    background:
      radial-gradient(700px 500px at 8% -6%, rgba(91,155,217,0.10), transparent 60%),
      radial-gradient(650px 480px at 108% 12%, rgba(201,162,39,0.09), transparent 55%);
  }
  .hazard-strip{
    height:4px;width:100%;
    background:repeating-linear-gradient(-45deg, var(--gold) 0 10px, #0a0e15 10px 20px);
    opacity:0.55;
  }
  .wrap{position:relative;z-index:1;max-width:1160px;margin:0 auto;padding:0 24px 80px;}
  header{text-align:center;padding:44px 20px 34px;}
  header img{width:72px;height:72px;object-fit:contain;margin-bottom:16px;}
  header h1{font-family:'Barlow Semi Condensed',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;font-size:28px;margin:0 0 6px;}
  header p{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-faint);letter-spacing:1.4px;text-transform:uppercase;margin:0;}
  #statusLine{text-align:center;color:var(--text-faint);font-size:13px;padding:40px 0;}

  .tier-group{margin-bottom:34px;}
  .tier-head{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:9px;border-bottom:1px solid var(--border);}
  .tier-head .dot{width:9px;height:9px;border-radius:50%;flex:none;box-shadow:0 0 10px 1px currentColor;}
  .tier-head .name{font-family:'Barlow Semi Condensed',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:0.6px;font-size:14px;}
  .tier-head .count{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-faint);}
  .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:18px;}

  .card{
    position:relative;aspect-ratio:3/4;border-radius:13px;overflow:hidden;
    background:var(--surface);border:1px solid var(--border);
    cursor:pointer;padding:0;font:inherit;color:inherit;width:100%;
    opacity:0;transform:translateY(20px) scale(0.98);
    transition:opacity .55s ease, transform .55s ease, box-shadow .18s ease, border-color .18s ease;
    box-shadow:0 16px 34px -24px rgba(0,0,0,0.8);
  }
  .card.in-view{opacity:1;transform:translateY(0) scale(1);}
  .card:hover{border-color:var(--border-strong);box-shadow:0 24px 48px -20px rgba(0,0,0,0.9);}
  .card:hover .card-photo img{transform:scale(1.06);}
  .card-photo{position:absolute;inset:0;background:var(--surface-2);}
  .card-photo img{width:100%;height:100%;object-fit:cover;transition:transform .4s ease;}
  .card-photo .fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:'Barlow Semi Condensed',sans-serif;font-weight:700;font-size:46px;}
  .card-gradient{position:absolute;inset:0;background:linear-gradient(180deg, rgba(10,14,21,0) 38%, rgba(10,14,21,0.55) 65%, rgba(8,11,17,0.96) 100%);}
  .card-rank-badge{
    position:absolute;top:11px;left:11px;display:inline-flex;align-items:center;gap:5px;
    background:rgba(8,11,17,0.72);backdrop-filter:blur(3px);border:1px solid currentColor;
    padding:5px 10px 5px 8px;border-radius:20px;
    font-family:'IBM Plex Mono',monospace;font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;
  }
  .card-rank-badge .star{font-size:10px;line-height:1;}
  .card-name-plate{position:absolute;left:0;right:0;bottom:0;padding:14px 14px 16px;}
  .card-name-plate .name{font-family:'Barlow Semi Condensed',sans-serif;font-weight:700;font-size:16.5px;text-transform:uppercase;letter-spacing:0.4px;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,0.6);}

  .modal-overlay{
    position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;
    background:rgba(5,8,13,0.82);backdrop-filter:blur(4px);padding:24px;
  }
  .modal-overlay.show{display:flex;}
  .modal-card{
    position:relative;width:100%;max-width:620px;max-height:88vh;overflow-y:auto;
    background:var(--surface);border:1px solid var(--border-strong);border-radius:16px;overflow-x:hidden;
    box-shadow:0 50px 100px -20px rgba(0,0,0,0.9);
    animation:modalPop .28s cubic-bezier(.2,.9,.3,1.2);
  }
  @keyframes modalPop{from{opacity:0;transform:translateY(22px) scale(0.96);}to{opacity:1;transform:none;}}
  .modal-close{
    position:absolute;top:14px;right:14px;z-index:2;width:34px;height:34px;border-radius:50%;
    background:rgba(8,11,17,0.65);backdrop-filter:blur(3px);border:1px solid var(--border-strong);
    color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;
    transition:background .12s ease;
  }
  .modal-close:hover{background:rgba(8,11,17,0.9);}
  .modal-photo{width:100%;aspect-ratio:16/10;background:var(--surface-2);position:relative;overflow:hidden;}
  .modal-photo img{width:100%;height:100%;object-fit:cover;}
  .modal-photo .fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:'Barlow Semi Condensed',sans-serif;font-weight:700;font-size:64px;}
  .modal-photo-gradient{position:absolute;inset:0;background:linear-gradient(180deg, rgba(10,14,21,0) 55%, rgba(8,11,17,0.9) 100%);}
  .modal-rank-badge{
    position:absolute;left:26px;bottom:20px;display:inline-flex;align-items:center;gap:7px;
    background:rgba(8,11,17,0.65);backdrop-filter:blur(3px);border:1px solid currentColor;
    padding:7px 14px 7px 11px;border-radius:22px;
    font-family:'IBM Plex Mono',monospace;font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:0.7px;
  }
  .modal-rank-badge .star{font-size:13px;}
  .modal-body{padding:28px 30px 32px;}
  .modal-name{font-family:'Barlow Semi Condensed',sans-serif;font-weight:700;font-size:26px;text-transform:uppercase;letter-spacing:0.5px;margin:0 0 16px;}
  .modal-desc{font-size:14.5px;line-height:1.75;color:var(--text-dim);border-top:1px solid var(--border);padding-top:18px;}
  .modal-desc.empty{font-style:italic;color:var(--text-faint);}

  footer{text-align:center;color:var(--text-faint);font-size:11px;font-family:'IBM Plex Mono',monospace;letter-spacing:0.6px;padding:30px 0 10px;}
  @media (max-width:520px){
    .card-grid{grid-template-columns:repeat(auto-fill,minmax(135px,1fr));}
    .modal-body{padding:22px 20px 26px;}
  }
</style>
</head>
<body>

<div class="bg-decor"></div>
<div class="hazard-strip"></div>

<div class="wrap">
  <header>
    <img src="/logo.png" alt="City of Xlantis Police Department seal">
    <h1>Xlantis Police Department</h1>
    <p>Public Personnel Roster</p>
  </header>

  <div id="statusLine">Loading roster…</div>
  <div id="rosterContent"></div>

  <footer>XPD RECORDS MANAGEMENT SYSTEM — READ ONLY</footer>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-card" id="modalCard"></div>
</div>

<script>
(function(){
  const statusLine = document.getElementById('statusLine');
  const rosterContent = document.getElementById('rosterContent');
  const modalOverlay = document.getElementById('modalOverlay');
  const modalCard = document.getElementById('modalCard');

  let roster = [];
  let ranks = [];

  const TIERS = [
    { key: 'trainee', label: 'Trainee', max: 0, color: 'var(--tier-trainee)' },
    { key: 'officer', label: 'Officer tier', max: 0.25, color: 'var(--tier-officer)' },
    { key: 'nco', label: 'Corporal / Sergeant tier', max: 0.5, color: 'var(--tier-nco)' },
    { key: 'senior', label: 'Lieutenant / Captain tier', max: 0.75, color: 'var(--tier-senior)' },
    { key: 'command', label: 'Command staff', max: 1, color: 'var(--tier-command)' }
  ];

  function getTier(rank){
    if(!ranks.length) return TIERS[0];
    const idx = ranks.indexOf(rank);
    if(idx <= 0) return TIERS[0];
    const fraction = idx / (ranks.length - 1);
    return TIERS.find(t => fraction <= t.max) || TIERS[TIERS.length - 1];
  }

  function initials(name){
    return (name || '?').trim().split(/\s+/).slice(0,2).map(w => w[0]).join('').toUpperCase();
  }

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
  }

  function photoHtml(r, tierColor, size){
    if(r.imageUrl){
      return '<img src="' + escapeHtml(r.imageUrl) + '" alt="" loading="lazy" ' +
        'onerror="this.parentElement.innerHTML=\'<span class=&quot;fallback&quot; style=&quot;color:' + tierColor + ';font-size:' + size + 'px;&quot;>' + escapeHtml(initials(r.charname)) + '</span>\';">';
    }
    return '<span class="fallback" style="color:' + tierColor + ';font-size:' + size + 'px;">' + escapeHtml(initials(r.charname)) + '</span>';
  }

  function renderList(){
    if(roster.length === 0){
      statusLine.textContent = 'No active personnel on record.';
      return;
    }
    statusLine.style.display = 'none';

    const groups = {};
    TIERS.forEach(t => groups[t.key] = []);
    roster.forEach(r => groups[getTier(r.rank).key].push(r));

    rosterContent.innerHTML = [...TIERS].reverse().map(tier => {
      const people = groups[tier.key];
      if(people.length === 0) return '';
      const cards = people.map(r =>
        '<button class="card" data-id="' + escapeHtml(r.id) + '">' +
          '<div class="card-photo">' + photoHtml(r, tier.color, 40) + '</div>' +
          '<div class="card-gradient"></div>' +
          '<div class="card-rank-badge" style="color:' + tier.color + ';"><span class="star">★</span>' + escapeHtml(r.rank) + '</div>' +
          '<div class="card-name-plate"><div class="name">' + escapeHtml(r.charname || '—') + '</div></div>' +
        '</button>'
      ).join('');
      return '<div class="tier-group">' +
        '<div class="tier-head"><span class="dot" style="background:' + tier.color + ';color:' + tier.color + ';"></span><span class="name">' + tier.label + '</span><span class="count">' + people.length + '</span></div>' +
        '<div class="card-grid">' + cards + '</div>' +
      '</div>';
    }).join('');

    rosterContent.querySelectorAll('.card').forEach(card => {
      card.addEventListener('click', () => openDetail(card.getAttribute('data-id')));
    });

    observeCards();
  }

  function observeCards(){
    const cards = rosterContent.querySelectorAll('.card');
    if(!('IntersectionObserver' in window)){
      cards.forEach(c => c.classList.add('in-view'));
      return;
    }
    const io = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if(entry.isIntersecting){
          entry.target.classList.add('in-view');
          io.unobserve(entry.target);
        }
      });
    }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });
    cards.forEach(c => io.observe(c));
  }

  function openDetail(id){
    const r = roster.find(x => x.id === id);
    if(!r) return;
    const tier = getTier(r.rank);

    modalCard.innerHTML =
      '<button class="modal-close" id="modalCloseBtn" aria-label="Close">✕</button>' +
      '<div class="modal-photo">' +
        '<div class="card-photo" style="position:absolute;inset:0;">' + photoHtml(r, tier.color, 72) + '</div>' +
        '<div class="modal-photo-gradient"></div>' +
        '<div class="modal-rank-badge" style="color:' + tier.color + ';"><span class="star">★</span>' + escapeHtml(r.rank) + '</div>' +
      '</div>' +
      '<div class="modal-body">' +
        '<h2 class="modal-name">' + escapeHtml(r.charname || '—') + '</h2>' +
        '<div class="modal-desc' + (r.description ? '' : ' empty') + '">' +
          (r.description ? escapeHtml(r.description) : 'No additional details on file for this officer.') +
        '</div>' +
      '</div>';

    modalOverlay.classList.add('show');
    document.body.style.overflow = 'hidden';
    document.getElementById('modalCloseBtn').addEventListener('click', closeDetail);
  }

  function closeDetail(){
    modalOverlay.classList.remove('show');
    document.body.style.overflow = '';
  }

  modalOverlay.addEventListener('click', function(e){
    if(e.target === modalOverlay) closeDetail();
  });
  document.addEventListener('keydown', function(e){
    if(e.key === 'Escape') closeDetail();
  });

  async function load(){
    try{
      const res = await fetch('/api/public-roster');
      const data = await res.json();
      if(!res.ok) throw new Error(data.error || 'Could not load the roster.');

      roster = data.roster || [];
      ranks = data.ranks || [];
      renderList();
    }catch(err){
      statusLine.textContent = 'Could not load the roster right now. Please try again shortly.';
    }
  }

  load();
})();
</script>
</body>
</html>
